name: Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Inject OAuth credentials
        run: |
          sed -i "s|%%GWS_AUTH_CLIENT_ID%%|${{ secrets.GWS_AUTH_CLIENT_ID }}|g" lib/credentials.js
          sed -i "s|%%GWS_AUTH_CLIENT_SECRET%%|${{ secrets.GWS_AUTH_CLIENT_SECRET }}|g" lib/credentials.js

      - name: Verify credentials were injected
        run: |
          if grep -q '%%' lib/credentials.js; then
            echo "::error::Credentials not injected. Check GitHub Secrets."
            exit 1
          fi

      - run: npm install

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
