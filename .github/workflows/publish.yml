name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject OAuth credentials
        env:
          CLIENT_ID: ${{ secrets.GWS_AUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GWS_AUTH_CLIENT_SECRET }}
        run: node scripts/inject-credentials.js

      - name: Verify credentials were injected
        run: |
          if grep -q '%%' lib/credentials.js; then
            echo "::error::Credentials not injected. Check GitHub Secrets."
            exit 1
          fi

      - run: npm install

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL="anthropic-kr-gws-auth-${VERSION}.tgz"
          gh release create "$GITHUB_REF_NAME" "$TARBALL" \
            --title "gws-auth ${GITHUB_REF_NAME}" \
            --notes "Install: \`npm i -g https://github.com/planetarium/gws-auth/releases/download/${GITHUB_REF_NAME}/${TARBALL}\`"
        env:
          GH_TOKEN: ${{ github.token }}
